apiVersion: apps/v1
kind: Deployment
metadata:
  name: cadastrocliente
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cadastrocliente
  template:
    metadata:
      labels:
        app: cadastrocliente
    spec:
      containers:
        - name: app
          image: southamerica-east1-docker.pkg.dev/viratech-1010/repository-new/cadastrocliente-app:v1
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/clientedb
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: admin
            - name: SERVER_PORT
              value: "8081"
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 512Mi