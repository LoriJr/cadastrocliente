apiVersion: apps/v1
kind: Deployment
metadata:
  name: cadastrocliente
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cadastrocliente
  template:
    metadata:
      labels:
        app: cadastrocliente
    spec:
      containers:
        - name: cadastrocliente
          image: southamerica-east1-docker.pkg.dev/viratech-1010/cadastrocliente-repo/cadastrocliente-app:v1
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/clientedb
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: admin
            - name: SERVER_PORT
              value: "8081"
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 512Mi
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: [ 'sh', '-c', 'until nc -z postgres 5432; do echo waiting for db; sleep 2; done;' ]