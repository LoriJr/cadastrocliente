# application-example.properties

spring.application.name=cadastrocliente

# Porta da aplica\u00E7\u00E3o

server.port=8081

# DATABASE (PostgreSQL)

# Defina via vari\u00E1vel de ambiente ou substitua aqui para uso local

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clientedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Mostrar SQL no console (desabilitar em produ\u00E7\u00E3o)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MESSAGES
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=true
